checkpoint:
  model_dir: saved_model

model:
  max_seq_length: 512
  load_in_4bit: true

data:
  test_csv: sample_data/test.csv
  text_column: text
  label_column: label

test:
  batch_size: 2
  max_new_tokens: 4
  temperature: 0.0
  do_sample: false
  prompt_template: "### Instructions: Classify the banking message into one unique intent code from 0 to 76. Do not output anything else.\n### Message: {text}\n### Intent Code:"
