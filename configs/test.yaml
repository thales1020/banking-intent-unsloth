checkpoint:
  model_dir: saved_model

model:
  max_seq_length: 512
  load_in_4bit: true

data:
  test_csv: sample_data/test.csv
  text_column: text
  label_column: label

test:
  batch_size: 2
  max_new_tokens: 4
  temperature: 0.0
  do_sample: false
  prompt_template: "### Huong dan: Phan loai tin nhan ngan hang sau vao mot ma y dinh duy nhat tu 0 den 76. Khong tra loi gi them ngoai con so.\n### Tin nhan: {text}\n### Ma y dinh:"
