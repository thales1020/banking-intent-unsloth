model:
  name: unsloth/Qwen2.5-0.5B-Instruct
  max_seq_length: 512
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_csv: sample_data/train.csv
  text_column: text
  label_column: label
  output_text_column: formatted_text
  prompt_template: "### Huong dan: Phan loai tin nhan ngan hang sau vao mot ma y dinh duy nhat tu 0 den 76. Khong tra loi gi them ngoai con so.\n### Tin nhan: {text}\n### Ma y dinh: {label}"

max_seq_length: 512
batch_size: 2
num_train_epochs: 3
learning_rate: 2.0e-4
output_dir: outputs
seed: 42

training:
  gradient_accumulation_steps: 8
  warmup_steps: 5
  logging_steps: 5

save:
  output_dir: saved_model
